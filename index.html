<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños 🌻</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #fff8e1, #ffe0b2);
        overflow-x: hidden;
    }header {
    text-align: center;
    padding: 40px 20px;
    background: #ffcc80;
    color: #6d4c41;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    font-size: 3em;
    margin: 0;
}

.sunflower {
    font-size: 40px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.container {
    padding: 30px;
    max-width: 800px;
    margin: auto;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 10px;
    font-size: 1em;
    resize: none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ffb74d;
    color: white;
    font-size: 1em;
    cursor: pointer;
}

button:hover {
    background: #ffa726;
}

.messages {
    margin-top: 20px;
}

.message {
    background: #fff3e0;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

footer {
    text-align: center;
    padding: 20px;
    color: #6d4c41;
}

</style>
</head>
<body><header>
    <div class="sunflower">🌻 🌻 🌻</div>
    <h1>¡Feliz Cumpleaños!</h1>
    <p>Que tu día esté lleno de alegría y luz 🌞</p>
</header><div class="container">
    <div class="card">
        <h2>Escribe tu mensaje 💛</h2>
        <textarea id="mensaje" placeholder="Escribe algo bonito..."></textarea>
        <button onclick="agregarMensaje()">Agregar mensaje</button><div class="messages" id="listaMensajes"></div>
</div>

</div><footer>
    <p>Hecho con cariño 🌻</p>
</footer><script>
function agregarMensaje() {
    const texto = document.getElementById('mensaje').value;
    if (texto.trim() === '') return;

    const contenedor = document.getElementById('listaMensajes');
    const nuevo = document.createElement('div');
    nuevo.classList.add('message');
    nuevo.textContent = texto;

    contenedor.appendChild(nuevo);
    document.getElementById('mensaje').value = '';
}
</script></body>
</html>
